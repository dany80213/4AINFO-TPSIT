<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Items</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 680px;
        }

        header {
            text-align: center;
            margin-bottom: 36px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        header p {
            margin-top: 6px;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 28px;
            backdrop-filter: blur(12px);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 18px;
        }

        /* Add item form */
        .add-form {
            display: flex;
            gap: 10px;
        }

        .add-form input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .add-form input::placeholder {
            color: #64748b;
        }

        .add-form input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn-primary {
            padding: 12px 22px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        /* Items list */
        #items-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #items-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            transition: background 0.2s;
            animation: fadeIn 0.25s ease;
        }

        #items-list li:hover {
            background: rgba(255, 255, 255, 0.09);
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-id {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: rgba(99, 102, 241, 0.25);
            color: #818cf8;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .item-name {
            color: #e2e8f0;
            font-size: 0.97rem;
            font-weight: 500;
        }

        .btn-delete {
            padding: 6px 14px;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 7px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .btn-delete:active {
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            padding: 32px 0;
            color: #475569;
            font-size: 0.92rem;
        }

        .empty-state svg {
            display: block;
            margin: 0 auto 12px;
            opacity: 0.4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Gestione Items</h1>
            <p>API REST &mdash; Node.js</p>
        </header>

        <!-- Add item -->
        <div class="card">
            <h2>Aggiungi Item</h2>
            <div class="add-form">
                <input type="text" id="item-name" placeholder="Nome del nuovo item..." autocomplete="off">
                <button class="btn-primary" onclick="addItem()">Aggiungi</button>
            </div>
        </div>

        <!-- Items list -->
        <div class="card">
            <h2>Lista Items</h2>
            <ul id="items-list">
                <li class="empty-state">
                    <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                                 M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                    Nessun item presente
                </li>
            </ul>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:3000/api/items";

        async function loadItems() {
            const res = await fetch(API_URL);
            const items = await res.json();
            const list = document.getElementById("items-list");
            list.innerHTML = "";

            if (items.length === 0) {
                list.innerHTML = `
                    <li class="empty-state">
                        <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                                     M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        Nessun item presente
                    </li>`;
                return;
            }

            items.forEach(item => {
                const li = document.createElement("li");

                const info = document.createElement("div");
                info.className = "item-info";

                const idBadge = document.createElement("span");
                idBadge.className = "item-id";
                idBadge.textContent = item.id;

                const name = document.createElement("span");
                name.className = "item-name";
                name.textContent = item.name;

                info.appendChild(idBadge);
                info.appendChild(name);

                const deleteBtn = document.createElement("button");
                deleteBtn.className = "btn-delete";
                deleteBtn.textContent = "Elimina";
                deleteBtn.onclick = () => deleteItem(item.id);

                li.appendChild(info);
                li.appendChild(deleteBtn);
                list.appendChild(li);
            });
        }

        async function addItem() {
            const input = document.getElementById("item-name");
            const name = input.value.trim();
            if (!name) return;

            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name })
            });

            input.value = "";
            loadItems();
        }

        document.getElementById("item-name").addEventListener("keydown", e => {
            if (e.key === "Enter") addItem();
        });

        async function deleteItem(id) {
            await fetch(`${API_URL}/${id}`, { method: "DELETE" });
            loadItems();
        }

        loadItems();
    </script>

</body>
</html>
